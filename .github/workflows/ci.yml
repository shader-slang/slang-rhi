name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "LICENSES/**"
      - "LICENSE"
      - "**.md"
      - .github/workflows/ci-gcp.yml
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "LICENSES/**"
      - "LICENSE"
      - "**.md"
      - .github/workflows/ci-gcp.yml
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["windows", "linux", "macos"]
        platform: ["x86_64", "aarch64"]
        compiler: ["msvc", "gcc", "clang"]
        config: ["Debug", "Release"]
        exclude:
          # Exclude x86_64 for macos
          - { os: macos, platform: x86_64}
          # Exclude unavailable compilers
          - { os: windows, compiler: gcc }
          - { os: windows, platform: aarch64, compiler: clang }
          - { os: linux, compiler: msvc }
          - { os: macos, compiler: msvc }
          - { os: macos, compiler: gcc }
        include:
          # Builds running on self-hosted runners (build + tests)
          - { os: windows, platform: "x86_64", compiler: clang, preset: clang, config: "Debug", flags: "unit-test,coverage,asan", runs-on: { group: nvrgfx, labels: [Windows, X64] } }
          - { os: windows, platform: "x86_64", compiler: msvc, preset: default, config: "Release", flags: "unit-test", runs-on: { group: nvrgfx, labels: [Windows, X64] } }
          - { os: linux, platform: "x86_64", compiler: clang, preset: clang, config: "Debug", flags: "unit-test,coverage,asan", runs-on: { group: nvrgfx, labels: [Linux, X64] } }
          - { os: linux, platform: "x86_64", compiler: clang, preset: clang, config: "Release", flags: "unit-test", runs-on: { group: nvrgfx, labels: [Linux, X64] } }
          # Builds running on GitHub hosted runners (build + tests)
          - { os: macos, platform: "aarch64", compiler: clang, preset: default, config: "Debug", flags: "unit-test,coverage,asan", runs-on: macos-latest }
          - { os: macos, platform: "aarch64", compiler: clang, preset: default, config: "Release", flags: "unit-test", runs-on: macos-latest }
          # Builds running on GitHub hosted runners (build. disabled tests on WARP as they were failing D3D12)
          - { os: windows, platform: "x86_64", compiler: clang, preset: clang, config: "Release", runs-on: windows-latest }
          - { os: windows, platform: "x86_64", compiler: msvc, preset: default, config: "Debug", runs-on: windows-latest }
          - { os: windows, platform: "aarch64", compiler: msvc, preset: default, config: "Release", runs-on: windows-11-arm }
          # Raytracing tests are flakey on aarch64/Debug builds, so tests are currently disabled
          - { os: windows, platform: "aarch64", compiler: msvc, preset: default, config: "Debug", flags: "", runs-on: windows-11-arm }
          # Builds running on GitHub hosted runners (build only)
          - { os: linux, platform: "x86_64", compiler: gcc, preset: gcc, runs-on: ubuntu-latest }
          - { os: linux, platform: "aarch64", compiler: clang, preset: clang, runs-on: ubuntu-24.04-arm }
          - { os: linux, platform: "aarch64", compiler: gcc, preset: gcc, runs-on: ubuntu-24.04-arm }
          # Emscripten builds (build only, no tests)
          - { os: linux, platform: "x86_64", compiler: emscripten, preset: emscripten, config: "Debug", runs-on: ubuntu-latest }
          - { os: linux, platform: "x86_64", compiler: emscripten, preset: emscripten, config: "Release", runs-on: ubuntu-latest }

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Linux
        if: matrix.os == 'linux' && contains(matrix.runs-on, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y xorg-dev

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.platform == 'aarch64' && 'amd64_arm64' || 'amd64'}}

      - name: Setup CMake/Ninja
        uses: lukka/get-cmake@latest

      - name: Setup Emscripten
        if: matrix.compiler == 'emscripten'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Configure
        run: cmake --preset ${{matrix.preset}} ${{ contains(matrix.flags, 'coverage') && '-DSLANG_RHI_ENABLE_COVERAGE=ON' || '' }} ${{ contains(matrix.flags, 'asan') && '-DSLANG_RHI_ENABLE_ASAN=ON' || '' }}

      - name: Build
        run: cmake --build build --config ${{matrix.config}}

      - name: Setup Sanitizer Options
        if: contains(matrix.flags, 'asan')
        shell: bash
        run: |
          # Find llvm-symbolizer for proper stack symbolization
          SYMBOLIZER=$(which llvm-symbolizer 2>/dev/null || which llvm-symbolizer-18 2>/dev/null || which llvm-symbolizer-17 2>/dev/null || echo "")
          if [[ -n "$SYMBOLIZER" ]]; then
            echo "ASAN_SYMBOLIZER_PATH=$SYMBOLIZER" >> "$GITHUB_ENV"
          fi
          ASAN_OPTS="halt_on_error=1:symbolize=1:fast_unwind_on_malloc=0:suppressions=${{ github.workspace }}/tools/asan-suppressions.txt"
          if [[ "${{ matrix.os }}" != "macos" ]]; then
            ASAN_OPTS="detect_leaks=1:protect_shadow_gap=0:${ASAN_OPTS}"
            echo "LSAN_OPTIONS=suppressions=${{ github.workspace }}/tools/lsan-suppressions.txt" >> "$GITHUB_ENV"
          fi
          echo "ASAN_OPTIONS=${ASAN_OPTS}" >> "$GITHUB_ENV"

      - name: Unit Tests
        if: contains(matrix.flags, 'unit-test')
        run: ./slang-rhi-tests -check-devices
        working-directory: build/${{matrix.config}}
        env:
          XDG_RUNTIME_DIR: /tmp

      - name: Unit Tests (OptiX 8.0)
        if: contains(matrix.flags, 'unit-test')
        run: ./slang-rhi-tests -tc="ray-tracing*.cuda" -check-devices -optix-version=80000
        working-directory: build/${{matrix.config}}
        env:
          XDG_RUNTIME_DIR: /tmp

      - name: Unit Tests (OptiX 8.1)
        if: contains(matrix.flags, 'unit-test')
        run: ./slang-rhi-tests -tc="ray-tracing*.cuda" -check-devices -optix-version=80100
        working-directory: build/${{matrix.config}}
        env:
          XDG_RUNTIME_DIR: /tmp

      - name: Coverage Report
        if: contains(matrix.flags, 'coverage')
        continue-on-error: true
        run: cmake --build build --config ${{matrix.config}} --target coverage

      - name: Upload Coveralls
        if: contains(matrix.flags, 'coverage')
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ${{ github.workspace }}/build/coverage.lcov
          flag-name: ${{ matrix.os }}-${{ matrix.platform }}
          parallel: true

  finish:
    needs: build
    if: ${{ always() }}
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - name: Finish Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        carryforward: "windows-x86_64,linux-x86_64,macos-aarch64"
